<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ShopeeScope</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 400px;
  font-family: -apple-system, 'Inter', sans-serif;
  background: #f5f6fa;
  color: #1a1d2e;
  font-size: 13px;
}

/* HEADER */
.hdr {
  background: #fff;
  border-bottom: 1px solid #e2e4ec;
  padding: 11px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo { font-size: 15px; font-weight: 800; letter-spacing: -.3px; }
.logo em { color: #f97316; font-style: normal; }
.hdr-right { display: flex; align-items: center; gap: 10px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; transition: all .3s; }
.status-dot.running { background: #f97316; box-shadow: 0 0 8px #f97316; animation: pulse 1.5s infinite; }
.status-dot.done    { background: #10b981; box-shadow: 0 0 6px #10b981; }
.status-dot.captcha { background: #ef4444; box-shadow: 0 0 8px #ef4444; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* TABS */
.tabs {
  display: flex;
  background: #fff;
  border-bottom: 2px solid #e2e4ec;
}
.tab {
  flex: 1; padding: 9px 0; font-size: 12px; font-weight: 600;
  text-align: center; cursor: pointer; color: #6b7280;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all .2s;
}
.tab.active { color: #f97316; border-bottom-color: #f97316; }

/* CAPTCHA ALERT */
.captcha-alert {
  display: none; background: #fef2f2;
  border-left: 3px solid #ef4444;
  padding: 7px 14px; font-size: 11px;
  color: #991b1b; font-weight: 600;
}
.captcha-alert.show { display: block; }

/* TAB PANELS */
.panel { display: none; }
.panel.active { display: block; }

/* ── RUN TAB ── */
.progress-section { padding: 13px 16px 10px; background: #fff; margin-bottom: 8px; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.shop-name { font-weight: 700; font-size: 13px; }
.shop-counter { font-size: 11px; color: #6b7280; font-family: monospace; }
.progress-bar-wrap { background: #f0f1f6; border-radius: 6px; height: 6px; overflow: hidden; margin-bottom: 10px; }
.progress-bar { height: 100%; background: linear-gradient(90deg,#f97316,#fb923c); border-radius: 6px; transition: width .5s ease; width: 0%; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.stat-box { background: #f5f6fa; border-radius: 8px; padding: 8px; text-align: center; }
.stat-val { font-size: 20px; font-weight: 800; line-height: 1; margin-bottom: 2px; }
.stat-lbl { font-size: 10px; color: #6b7280; }
.stat-box.products .stat-val { color: #f97316; }
.stat-box.variants .stat-val { color: #8b5cf6; }
.stat-box.errors   .stat-val { color: #ef4444; }
.phase-tag {
  display: none; font-size: 10px; padding: 2px 8px;
  border-radius: 10px; background: #fff7ed; color: #c2410c;
  font-weight: 600; margin-bottom: 8px;
}
.shops-section { padding: 0 16px 12px; }
.shops-title { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; margin-top: 10px; }
.shops-scroll { max-height: 140px; overflow-y: auto; }
.shop-row { display: flex; align-items: center; padding: 4px 0; border-bottom: 1px solid #f0f1f6; gap: 7px; }
.shop-row:last-child { border-bottom: none; }
.shop-icon { font-size: 11px; width: 14px; text-align: center; }
.shop-uname { flex: 1; font-size: 11px; color: #374151; font-family: monospace; }
.shop-stats-small { font-size: 10px; color: #6b7280; font-family: monospace; }
.shop-stats-small.done { color: #10b981; }
.idle-msg { padding: 18px 0; text-align: center; color: #9ca3af; font-size: 11px; line-height: 1.6; }
.idle-msg strong { display: block; font-size: 13px; color: #6b7280; margin-bottom: 3px; }

/* ── SHOPS TAB ── */
.shops-tab-wrap { padding: 12px 14px; }
.add-shop-row { display: flex; gap: 7px; margin-bottom: 10px; }
.add-shop-input {
  flex: 1; background: #fff; border: 1px solid #d1d5db;
  color: #1a1d2e; padding: 8px 10px; border-radius: 7px;
  font-size: 11px; font-family: inherit; outline: none;
}
.add-shop-input:focus { border-color: #f97316; }
.btn-add { padding: 8px 12px; background: #10b981; color: #fff; border: none; border-radius: 7px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.add-status { font-size: 10px; color: #6b7280; font-family: monospace; margin-bottom: 8px; min-height: 14px; }
.add-status.err { color: #ef4444; }
.add-status.ok  { color: #10b981; }

.shop-cards { max-height: 340px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.shop-card {
  background: #fff; border-radius: 9px; padding: 10px 11px;
  border: 1px solid #e2e4ec;
}
.shop-card-name { font-weight: 700; font-size: 12px; margin-bottom: 2px; color: #1a1d2e; }
.shop-card-stats { font-size: 10px; color: #6b7280; margin-bottom: 8px; }
.shop-card-stats span { color: #374151; font-weight: 600; }
.shop-card-btns { display: flex; gap: 5px; }
.btn-scrape-now {
  flex: 1; padding: 6px 0; background: #f97316; color: #fff;
  border: none; border-radius: 6px; font-size: 10px; font-weight: 700;
  cursor: pointer; transition: opacity .2s;
}
.btn-scrape-now:hover { opacity: .85; }
.btn-scrape-now:disabled { opacity: .4; cursor: not-allowed; }
.btn-view-shop {
  padding: 6px 8px; background: #f0f1f6; color: #374151;
  border: none; border-radius: 6px; font-size: 10px; font-weight: 600;
  cursor: pointer;
}
.scraping-progress { margin-top: 6px; }
.scraping-prog-bar {
  background: #f0f1f6; border-radius: 4px; height: 4px; overflow: hidden; margin-bottom: 3px;
}
.scraping-prog-fill {
  height: 100%; background: linear-gradient(90deg,#f97316,#fb923c);
  border-radius: 4px; transition: width .5s ease; width: 5%;
}
.scraping-prog-label { font-size: 9px; color: #f97316; font-weight: 700; text-align: center; }

/* BUTTONS */
.btn-row { display: flex; gap: 8px; padding: 11px 14px; background: #fff; border-top: 1px solid #e2e4ec; }
.btn { flex: 1; padding: 9px 10px; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-run { background: #f97316; color: #fff; }
.btn-secondary { background: #f0f1f6; color: #374151; }
.btn-open { background: #f97316; color: #fff; font-size: 13px; padding: 11px; }

/* NOT ON SHOPEE */
.not-shopee { padding: 20px 16px; text-align: center; }
.not-shopee p { color: #6b7280; font-size: 12px; margin-bottom: 12px; line-height: 1.6; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">Shopee<em>Scope</em></div>
  <div class="hdr-right">
    <div id="statusDot" class="status-dot"></div>
  </div>
</div>

<!-- CAPTCHA ALERT -->
<div id="captchaAlert" class="captcha-alert">⚠️ CAPTCHA — 切到 Shopee 标签页解开滑块即可，会【自动继续】，不用停止/重跑</div>
<!-- INLINE ERROR (replaces alert() popups) -->
<div id="inlineErr" style="display:none;background:#fef2f2;border-left:3px solid #ef4444;padding:7px 14px;font-size:11px;color:#991b1b;font-weight:600"></div>

<!-- NOT ON SHOPEE -->
<div id="notShopee" class="not-shopee" style="display:none">
  <p>请先打开 <strong>shopee.com.my</strong><br>并登录账号，才能运行采集</p>
  <button class="btn btn-open" id="btnOpenShopee" style="width:100%">打开 Shopee</button>
</div>

<!-- MAIN UI -->
<div id="mainUI">

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" id="tabRun">▶ 运行</div>
    <div class="tab" id="tabShops">🏪 店铺管理</div>
  </div>

  <!-- RUN PANEL -->
  <div class="panel active" id="panelRun">
    <div class="progress-section">
      <div class="progress-header">
        <span class="shop-name" id="shopName">待机</span>
        <span class="shop-counter" id="shopCounter">0 / 13</span>
      </div>
      <div id="phaseTag" class="phase-tag"></div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
      <div class="stats-row">
        <div class="stat-box products"><div class="stat-val" id="statProducts">0</div><div class="stat-lbl">产品</div></div>
        <div class="stat-box variants"><div class="stat-val" id="statVariants">0</div><div class="stat-lbl">Variants</div></div>
        <div class="stat-box errors"><div class="stat-val" id="statErrors">0</div><div class="stat-lbl">错误</div></div>
      </div>
    </div>
    <div class="shops-section">
      <div class="shops-title">各店进度</div>
      <div class="shops-scroll" id="shopsList">
        <div class="idle-msg"><strong>待机中</strong>点「▶ 运行」开始今日全量采集</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-run" id="btnRun">▶ 全量运行</button>
      <button class="btn btn-secondary" id="btnStop" style="display:none">⏹ 停止</button>
      <button class="btn btn-secondary" id="btnDashboard">📊 Dashboard</button>
    </div>
  </div>

  <!-- SHOPS PANEL -->
  <div class="panel" id="panelShops">
    <div class="shops-tab-wrap">
      <div class="add-shop-row">
        <input class="add-shop-input" id="addShopInput" placeholder="shopee.com.my/username 或 username">
        <button class="btn-add" id="btnAdd">+ 添加</button>
      </div>
      <div class="add-status" id="addStatus"></div>
      <div class="shop-cards" id="shopCards">
        <div class="idle-msg" style="grid-column:1/-1">加载中...</div>
      </div>
    </div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
