name: ShopeeScope Daily Scrape

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 8:00 AM MYT (UTC+8 → 0:00 UTC)
  workflow_dispatch:        # 允许手动触发

jobs:
  scrape:
    name: "Scrape ${{ matrix.shop }}"
    runs-on: self-hosted
    timeout-minutes: 30
    strategy:
      fail-fast: false      # 一家失败不影响其他
      matrix:
        shop:
          - buddysnack
          - winstartech
          - 1stopbatteries
          - icare4allshop
          - energizerbatteryhub
          - gadgetspecialist
          - gou.ori
          - tenbucksfood
          - dsconcept_store
          - sxmixempire
          - r_in_g
          - nextgenhardware.os
          - ham_radios.my

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: Install dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Scrape ${{ matrix.shop }}
        working-directory: scraper
        env:
          SHOP_NAME:            ${{ matrix.shop }}
          VERCEL_URL:           ${{ secrets.VERCEL_URL }}
        run: node scrape.js

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.shop }}
          path: scraper/*.log
          if-no-files-found: ignore
